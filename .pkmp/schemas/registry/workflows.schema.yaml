$schema: "http://json-schema.org/draft-07/schema#"
title: PKMP Workflows Registry Schema
type: object
required:
  - workflows
properties:
  workflows:
    type: array
    items:
      type: object
      required:
        - id
        - steps
      properties:
        id:
          type: string
        steps:
          type: array
          items:
            type: string
