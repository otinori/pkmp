$schema: "http://json-schema.org/draft-07/schema#"
title: PKMP Lifecycles Registry Schema
type: object
required:
  - lifecycles
properties:
  lifecycles:
    type: array
    items:
      type: object
      required:
        - id
        - states
      properties:
        id:
          type: string
        states:
          type: array
          items:
            type: string
