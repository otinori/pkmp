$schema: "http://json-schema.org/draft-07/schema#"
title: PKMP Schemas Registry Schema
type: object
required:
  - schemas
properties:
  schemas:
    type: array
    items:
      type: object
      required:
        - id
        - path
        - target_type
      properties:
        id:
          type: string
        path:
          type: string
        target_type:
          type: string
