id: LR-008
type: LearningRecord
title: "pkmp-simulate's own round-number-determination instruction undercounts the true round"
date: "2026-07-01"

context: |
  Before starting Round 36, `pkmp-simulate`'s SKILL.md instructed determining the
  round number by "counting how many LR/PI records have `source_change` starting
  with `simulation-round-` in `registry/records.yaml`, then add 1." Following
  this literally: only LR-001 through LR-006 use that exact top-level
  `source_change: simulation-round-N` field format — 6 records — which would
  yield round 7. But `grep -rhoE "round-[0-9]+" records/*.yaml` across all
  records (including `provenance.source: simulation/round-N-slug`, the format
  used by PI-001 through PI-007) shows the true historical maximum is round 35
  (PI-007). Following the documented instruction literally would have produced
  round 7 — colliding with the already-used round 7 (LR-002) — silently
  overwriting round history's meaning for anyone cross-referencing round numbers
  later.

learning: |
  The instruction assumed a single consistent field convention
  (`source_change: simulation-round-N`), but the actual corpus mixes that with
  an older convention (`provenance.source: simulation/round-N-slug`) used by
  the PI records from earlier rounds. A counting-based heuristic silently
  breaks the moment the underlying data has more than one field convention for
  the same fact — it doesn't error, it just produces a wrong but
  plausible-looking number.

  Fixed directly in `.agent/skills/pkmp-simulate/SKILL.md` — the real,
  git-tracked directory (`ls -la skills/ .claude/skills/` shows both
  `skills/simulate` and `.claude/skills/pkmp-simulate` are symlinks pointing to
  `.agent/skills/pkmp-simulate/`), so editing that one path is sufficient; both
  other invocation paths resolve through the symlink automatically and never
  drift. The instruction now says to scan for the maximum `N` in any
  `round-\d+` match across `source_change` and `provenance.source` fields, and
  explicitly warns against counting records.

applicability: |
  When a skill's own bookkeeping instruction (numbering, counting, ID
  assignment) depends on a field convention, verify that convention actually
  holds across the *entire* historical corpus before trusting a
  count/max/scan — not just the most recent examples. A convention that was
  introduced partway through a project's history will make any instruction
  written against "the current convention" silently wrong for older data.

source_change: simulation-round-36

provenance:
