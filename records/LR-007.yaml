id: LR-007
type: LearningRecord
title: "pkmp-init bootstraps .pkmp/ runtime code but never installs its Node dependencies"
date: "2026-06-29"
state: Published

context: |
  SRM (the first external project bootstrapped from PKMP via pkmp-init) ran
  `node .pkmp/bin/pkmp.js verify` for the first time during this session and
  hit `Error [ERR_MODULE_NOT_FOUND]: Cannot find package 'yaml'`. The project
  had a full `.pkmp/bin` + `.pkmp/lib` copy (per pkmp-init step 0) but no
  `package.json` declaring the `yaml`/`jsonschema` dependencies the runtime
  imports, and no `node_modules/` installed. `dist/`, the source pkmp-init
  copies from, never included a `package.json` either.

  Because the real verify/regenerate tool was unusable, all prior "regenerate"
  passes on the SRM project had been done by hand-writing Markdown to match
  the template shown in `skills/regenerate/SKILL.md`, instead of running the
  actual renderer in `.pkmp/lib/renderers/markdown.js`. Once the dependency
  was fixed and the real tool was run, every existing view file in SRM
  (5 docs + 6 records) diffed — the hand-written views had drifted from the
  real renderer's output format (e.g. missing the "DO NOT EDIT" header,
  wrong heading levels for rejected alternatives).

learning: |
  pkmp-init's "Ensure PKMP runtime is present" step only copies the *code*
  (`.pkmp/`), not the *runtime environment* it needs to execute. A bootstrap
  step that leaves its own tool non-functional fails silently from the AI
  agent's point of view: the agent falls back to manually approximating the
  tool's behavior (hand-writing views per the SKILL.md template) rather than
  reporting an error, because nothing actually throws until someone tries to
  run the real script. This is a second instance of the LR-004/LR-006 pattern
  ("functional setup is not sufficient") but for the runtime dependency layer
  instead of the agent-trigger layer.

  Fixed in this round:
  - Added `dist/package.json` and `dist/package-lock.json` (copies of the
    PKMP repo's own, since `.pkmp/bin/pkmp.js` resolves its workspace root
    relative to its own file location regardless of project name).
  - Updated `skills/init/SKILL.md` step 0 to copy these into the new
    project's root and run `npm install`, with a verification command
    (`node .pkmp/bin/pkmp.js verify`) before proceeding.
  - Backfilled SRM's missing `package.json`/`package-lock.json`, ran
    `npm install`, and re-ran the real verify/regenerate — which also
    surfaced and fixed a real YAML bug along the way (a list item in
    `records/DC-003.yaml` started with a backtick, a YAML-reserved leading
    character, which the lenient hand-written-view era had silently let
    through).

applicability: |
  When a skill bootstraps another tool's source code into a project, also
  verify and bootstrap that tool's *runtime dependencies*, and prove it
  works (run the tool, don't just copy files) before reporting success.

  When an AI agent cannot get a project's tooling to run, the right move is
  to fix the tooling gap and re-run the real tool — not to hand-simulate the
  tool's expected output. Hand-simulation looks like progress but silently
  diverges from ground truth (as the SRM views had) and never surfaces the
  underlying defect.

