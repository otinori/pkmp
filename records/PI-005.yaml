id: PI-005
type: ResearchRecord
title: "renderRecord ignores LearningRecord-specific fields and index title is misleading"
context: |
  During simulation Round 22, we traced the rendering of a LearningRecord through
  the renderer. The renderRecord function in .pkmp/lib/renderers/markdown.js renders:
  context, decision, rationale, implications, rejected_alternatives, review_trigger.
  It does NOT render: learning, applicability, source_change (added for LearningRecord).

  Also, renderIndexFiles generates views/all-decision-records.md with title
  "Project Decision Records Index" but it iterates ALL record types (LR, PI, DC, etc.).
  The filename and title are misleading for users.
decision: |
  Two fixes to .pkmp/lib/renderers/markdown.js:

  Fix 1 — Add LearningRecord fields to renderRecord:
    if (model.type === 'LearningRecord') {
      if (model.learning) {
        md += `## Learning\n\n${model.learning}\n\n`;
      }
      if (model.applicability) {
        md += `## Applicability\n\n${model.applicability}\n\n`;
      }
      if (model.source_change) {
        md += `**Source change**: ${model.source_change}\n\n`;
      }
    }

  Fix 2 — Rename index file and fix title:
    const outputPath = path.join(workspaceRoot, 'views/all-records.md');
    md = "# Project Knowledge Records Index\n\n" + ...
  Also update registry/records.yaml index view path to views/all-records.md.
rationale: |
  Without Fix 1, the LearningRecord's native fields are stored but never surfaced
  to readers of the view, making the view incomplete.
  Without Fix 2, readers see "Decision Records Index" and miss that it includes
  learning records and process improvement records.
implications:
  - "applies_to: pkmp-self"
  - "Target: .pkmp/lib/renderers/markdown.js"
  - "Requires: human approval (code change in .pkmp/)"
  - "Side effect: rename views/all-decision-records.md → views/all-records.md (update any references)"
provenance:
  source: simulation/round-22-renderer-gaps
  authored_by:
